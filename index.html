<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script type="module" src="scripts/index.js" defer></script>

    <title>Show Watchlist</title>
</head>

<body>

    <header>
        <div class="site-header container">
            <h1 class="main-heading">Find your show</h1>
            <a href="watchlist.html" class="navigation-tag">
                <span>My Watchlist</span>
            </a>
        </div>
    </header>

    <main>
        <section class="search-section container">
            <form id="search-bar" class="search-bar">
                <div>
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <input 
                    id="search-input" class="search-input" type="text"
                >
                <button id="search-btn">
                    Search
                </button>
            </form>
        </section>

        <section id="shows-section" class="shows-section container">
        </section>
    </main>
    <footer>
        <div class="footer-container container">
            <p>Dav's Show Watchlist App</p>
            <p>This product uses the TMDB API but is not endorsed or certified by TMDB.</p>
            <img class="tmdb-logo" src="/assets/tmdb-logo.svg" alt="TMDb logo" />
        </div>
    </footer>
</body>

</html>
